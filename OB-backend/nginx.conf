worker_processes 1;

events {
    worker_connections 1024;
}

http {
    upstream ob_backend {
        server host.docker.internal:8086;
        server host.docker.internal:8087;
    }

    server {
        listen 80;
        location / {
            proxy_pass http://ob_backend;
            proxy_set_header Host $host;
        }
    }
}